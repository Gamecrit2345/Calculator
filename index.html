<!DOCTYPE html>
<html lang="fil" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Calc</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.0.0/math.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .glass {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(24px);
        }
        
        .display {
            background: #020617;
        }
        
        .btn {
            transition: all 0.12s ease;
            touch-action: manipulation;
        }
        
        .btn:active {
            transform: scale(0.92);
        }
        
        .number { background-color: #334155; }
        .operator { background-color: #F97316; }
        .equal { background: linear-gradient(145deg, #3B82F6, #1E40AF); }
        .clear { background-color: #EF4444; }
        
        @media (max-width: 640px) {
            .btn {
                height: 78px !important;
                font-size: 1.45rem;
            }
            .display-text {
                font-size: 4.2rem;
            }
        }
    </style>
</head>
<body class="bg-[#0B1120] text-white min-h-screen flex flex-col overflow-hidden">

    <!-- Main Container -->
    <div class="flex-1 flex flex-col max-w-md mx-auto w-full bg-[#0B1120]">

        <!-- Display -->
        <div class="display flex-1 flex items-end justify-end p-8 pb-10">
            <div class="w-full">
                <div id="expression" class="text-right text-slate-400 text-xl min-h-[32px]"></div>
                <div id="display" class="display-text text-right text-[4.5rem] leading-none font-semibold tracking-tighter text-white break-all">
                    0
                </div>
            </div>
        </div>

        <!-- Mode Tabs -->
        <div class="flex border-b border-slate-700 bg-black/40">
            <button onclick="setMode(0)" id="tab-0"
                    class="flex-1 py-5 font-semibold border-b-2 border-blue-500 text-blue-400">BASIC</button>
            <button onclick="setMode(1)" id="tab-1"
                    class="flex-1 py-5 font-semibold text-slate-400">SCIENTIFIC</button>
        </div>

        <!-- Buttons -->
        <div id="buttons" class="flex-1 p-3 md:p-4 grid grid-cols-4 gap-2 bg-[#0B1120]">
            <!-- JS populated -->
        </div>

        <!-- History Bar -->
        <div class="p-4 border-t border-slate-700 bg-black/60 flex items-center justify-between text-sm">
            <div onclick="toggleHistory()" class="flex items-center gap-2 cursor-pointer">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span class="font-medium">HISTORY</span>
            </div>
            <button onclick="clearHistory()" class="text-slate-400 hover:text-white">
                <i class="fa-solid fa-trash"></i>
            </button>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldReset = false;
        let history = [];
        let currentMode = 0;

        const display = document.getElementById('display');
        const expr = document.getElementById('expression');

        function renderButtons(mode) {
            const container = document.getElementById('buttons');
            container.innerHTML = '';

            let layout = mode === 0 ? [
                ['C', '±', '%', '÷'],
                ['7', '8', '9', '×'],
                ['4', '5', '6', '−'],
                ['1', '2', '3', '+'],
                ['0', '.', '=']
            ] : [
                ['C', '(', ')', '⌫'],
                ['sin', 'cos', 'tan', '√'],
                ['log', 'ln', 'π', 'x²'],
                ['7', '8', '9', '÷'],
                ['4', '5', '6', '×'],
                ['1', '2', '3', '−'],
                ['0', '.', '+', '=']
            ];

            layout.forEach(row => {
                const rowEl = document.createElement('div');
                rowEl.className = 'grid grid-cols-4 gap-2';
                
                row.forEach(val => {
                    const btn = document.createElement('button');
                    btn.className = `btn rounded-3xl text-3xl font-medium text-white shadow-inner`;
                    
                    if (['÷','×','−','+'].includes(val)) btn.classList.add('operator');
                    else if (val === 'C') btn.classList.add('clear');
                    else if (val === '=') btn.classList.add('equal', 'col-span-1');
                    else if (['sin','cos','tan','√','log','ln','π','x²'].includes(val)) btn.classList.add('bg-indigo-600');
                    else btn.classList.add('number');
                    
                    if (val === '0') btn.classList.add('col-span-2');
                    
                    btn.textContent = val;
                    btn.onclick = () => handleClick(val);
                    rowEl.appendChild(btn);
                });
                container.appendChild(rowEl);
            });
        }

        function handleClick(val) {
            const opMap = {'÷':'/', '×':'*', '−':'-'};
            
            if ('0123456789.'.includes(val)) {
                if (shouldReset) {
                    currentInput = val;
                    shouldReset = false;
                } else {
                    currentInput = currentInput === '0' && val !== '.' ? val : currentInput + val;
                }
            } else if (['+','−','×','÷'].includes(val)) {
                if (operator) calculate();
                previousInput = currentInput;
                operator = opMap[val] || val;
                shouldReset = true;
                expr.textContent = `${previousInput} ${val}`;
            } else if (val === '=') {
                if (operator) {
                    calculate();
                    addHistory();
                }
            } else if (val === 'C') clearAll();
            else if (val === '⌫') currentInput = currentInput.slice(0,-1) || '0';
            else if (val === '±') currentInput = (-parseFloat(currentInput)).toString();
            else if (val === '%') currentInput = (parseFloat(currentInput)/100).toString();
            else if (['sin','cos','tan','√','log','ln','π','x²'].includes(val)) handleSci(val);
            
            updateDisplay();
        }

        function handleSci(func) {
            let n = parseFloat(currentInput);
            let res = 0;
            switch(func){
                case 'sin': res = Math.sin(n * Math.PI/180); break;
                case 'cos': res = Math.cos(n * Math.PI/180); break;
                case 'tan': res = Math.tan(n * Math.PI/180); break;
                case '√': res = Math.sqrt(n); break;
                case 'log': res = Math.log10(n); break;
                case 'ln': res = Math.log(n); break;
                case 'π': res = Math.PI; break;
                case 'x²': res = n*n; break;
            }
            currentInput = res.toFixed(8).replace(/\.?0+$/,'');
            shouldReset = true;
        }

        function calculate() {
            try {
                let result = math.evaluate(`${previousInput} ${operator} ${currentInput}`);
                currentInput = parseFloat(result.toFixed(8)).toString();
            } catch(e) { currentInput = "Error"; }
            operator = null;
            expr.textContent = '';
        }

        function updateDisplay() {
            display.textContent = currentInput;
        }

        function clearAll() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            expr.textContent = '';
            shouldReset = false;
        }

        function addHistory() {
            if (currentInput !== "Error") {
                history.unshift(`${previousInput} ${operator || ''} ${currentInput} = ${currentInput}`);
                if (history.length > 12) history.pop();
            }
        }

        function clearHistory() {
            history = [];
            alert("History cleared!");
        }

        function toggleHistory() {
            alert("Full history panel will be added soon!");
        }

        function setMode(m) {
            currentMode = m;
            document.getElementById('tab-0').classList.toggle('border-blue-500', m===0);
            document.getElementById('tab-0').classList.toggle('text-blue-400', m===0);
            document.getElementById('tab-1').classList.toggle('border-blue-500', m===1);
            document.getElementById('tab-1').classList.toggle('text-blue-400', m===1);
            renderButtons(m);
        }

        // Keyboard Support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleClick('=');
            else if (e.key === 'Backspace') handleClick('⌫');
            else if ('0123456789.+-*/'.includes(e.key)) {
                let v = e.key;
                if (v==='*') v='×';
                if (v==='/') v='÷';
                if (v==='-') v='−';
                handleClick(v);
            }
        });

        // Init
        window.onload = () => {
            renderButtons(0);
            updateDisplay();
            console.log("%c✅ Phone UI Fixed!", "color:#60a5fa; font-size:16px");
        };
    </script>
</body>
</html>
